# 使用 GitHub Actions 自动构建并发布到 GHCR 的镜像
# 本地开发请使用 make dev，无需本地构建镜像
services:
  app:
    image: ghcr.io/zuijiaosy/go-shadcn-demo:latest
    container_name: go-shadcn-demo

    ports:
      - "8080:8080"

    environment:
      - TZ=Asia/Shanghai
      - GIN_MODE=release

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped
